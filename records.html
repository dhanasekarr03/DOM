<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View all registered student records">
    <title>Student Records</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>Student Registration System</h1>
        <p class="subtitle">View all registered students below.</p>
        <nav class="navbar">
            <a href="index.html" class="nav-link">Home</a>
            <a href="records.html" class="nav-link active">View Records</a>
        </nav>
    </header>

    <div class="main-wrapper">

        <section class="table-section full-width">
            <h2>All Student Records</h2>

            <div class="table-container" id="tableContainer">
                <table id="studentTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Student ID</th>
                            <th>Email</th>
                            <th>Contact</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>

            <p class="empty-msg" id="noRecords">No students found. <a href="index.html">Add students here.</a></p>
        </section>

    </div>

    <footer class="footer">
        <p>&copy; 2026 Internshala Student Registration System</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
